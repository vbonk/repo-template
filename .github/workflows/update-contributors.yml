name: Update Contributors

on:
  push:
    branches: [main]
    paths-ignore:
      - 'CONTRIBUTORS.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: contributors-${{ github.ref }}
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Update contributors list
        run: |
          # Extract unique contributors from git history
          contributors=$(git log --format='%aN' | sort -uf)

          # Format as markdown list
          contributor_list=""
          while IFS= read -r name; do
            if [ -n "$name" ]; then
              contributor_list="${contributor_list}- **${name}**\n"
            fi
          done <<< "$contributors"

          # Replace content between marker comments in CONTRIBUTORS.md
          awk '
            /<!-- CONTRIBUTORS-START -->/ {
              print
              print ""
              system("git log --format='"'"'%aN'"'"' | sort -uf | while IFS= read -r name; do [ -n \"$name\" ] && echo \"- **${name}**\"; done")
              print ""
              skip=1
              next
            }
            /<!-- CONTRIBUTORS-END -->/ {
              skip=0
              print
              next
            }
            !skip { print }
          ' CONTRIBUTORS.md > CONTRIBUTORS.md.tmp
          mv CONTRIBUTORS.md.tmp CONTRIBUTORS.md

      - name: Commit and push changes
        run: |
          git diff --quiet CONTRIBUTORS.md || \
            (git config user.name 'github-actions[bot]' && \
             git config user.email 'github-actions[bot]@users.noreply.github.com' && \
             git add CONTRIBUTORS.md && \
             git commit -m 'docs: update contributors list [skip ci]' && \
             git push)

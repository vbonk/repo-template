# CI Workflow — Automated Checks on Every Push and PR
#
# What this does: Runs your tests, linter, and build automatically whenever
# you push code or open a pull request. If something breaks, GitHub shows a
# red X on the commit/PR so you know before merging.
#
# Why CI matters: Without this, broken code silently reaches your main branch.
# CI catches bugs, type errors, and style issues before they become problems.
# Even solo developers benefit — it is your automated code reviewer.
#
# How to customize: Uncomment the section below that matches your stack
# (Node.js, Python, Go, Rust, or Bun) and delete the placeholder step.

name: CI

on:
  push:
    branches: [main]
    # Why paths-ignore: Don't waste CI minutes on docs-only changes
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', '.editorconfig']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE', '.editorconfig']

# Why concurrency + cancel-in-progress: If you push 3 times in a row, only
# the latest push runs CI. Prevents wasting your GitHub Actions minutes on
# outdated commits that you have already moved past.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Why permissions: contents: read — Principle of least privilege.
# This workflow only needs to READ your code, not write to the repo.
# If a compromised action tried to push code or modify settings, this
# permission block prevents it. Always restrict to the minimum needed.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # Why timeout-minutes: Prevents runaway jobs from burning through your
    # GitHub Actions quota. Without this, a hanging test could run for 6 hours
    # (the default). 15 minutes is generous for most builds.
    timeout-minutes: 15

    steps:
      # Why SHA-pinning: Pinned to a full commit SHA instead of a version tag
      # (e.g., @v4) to prevent supply chain attacks. If an attacker compromises
      # the action's repo and moves the v4 tag, SHA-pinned repos are unaffected.
      # Dependabot will automatically create PRs to update these SHAs.
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2


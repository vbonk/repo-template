# CodeQL Analysis
# Runs GitHub's CodeQL security scanner.
# TEMPLATE: Uncomment languages in the matrix to enable scanning.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1' # Weekly Monday 08:00 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        # TEMPLATE: Uncomment languages used in your project.
        # Supported: javascript, typescript, python, go, ruby, java, kotlin, csharp, cpp, swift
        language: []
        # language:
        #   - javascript-typescript
        #   - python
        #   - go
        #   - java-kotlin
        #   - ruby
        #   - csharp
        #   - cpp
        #   - swift

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@38697555549f1db7851b81482ff19f1fa5c4fedc # v4.34.1
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@38697555549f1db7851b81482ff19f1fa5c4fedc # v4.34.1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@38697555549f1db7851b81482ff19f1fa5c4fedc # v4.34.1
        with:
          category: '/language:${{ matrix.language }}'
